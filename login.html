<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEOKiller — Вход</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body {
    background:#18181c; color:#e8e8e8;
    font-family:'Montserrat',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  body::before {
    content:''; position:fixed; width:500px; height:500px; border-radius:50%;
    background:radial-gradient(circle,rgba(120,80,220,0.25) 0%,transparent 70%);
    top:-150px; right:-100px; pointer-events:none;
  }
  body::after {
    content:''; position:fixed; width:350px; height:350px; border-radius:50%;
    background:radial-gradient(circle,rgba(80,40,160,0.15) 0%,transparent 70%);
    bottom:-100px; left:-80px; pointer-events:none;
  }
  .card {
    background:rgba(255,255,255,0.03); border:0.5px solid rgba(255,255,255,0.08);
    border-radius:18px; padding:40px 36px; width:100%; max-width:420px;
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    position:relative; z-index:1;
  }
  .logo { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
  .logo-icon {
    width:38px; height:38px; border-radius:9px;
    background:rgba(140,90,255,0.15); border:0.5px solid rgba(140,90,255,0.35);
    display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;
  }
  .logo-name { font-size:20px; font-weight:800; letter-spacing:-0.03em; color:#e8e8e8; }
  .logo-name span { color:#a78bfa; }
  .logo-sub { font-size:10px; color:rgba(255,255,255,0.3); font-family:'IBM Plex Mono',monospace; margin-top:2px; }
  .tabs {
    display:flex; background:rgba(255,255,255,0.03); border-radius:8px;
    padding:3px; border:0.5px solid rgba(255,255,255,0.07); margin-bottom:24px;
  }
  .tab {
    flex:1; padding:8px; border:none; background:transparent;
    color:rgba(255,255,255,0.3); font-size:12px; font-family:'Montserrat',sans-serif;
    cursor:pointer; border-radius:6px; transition:all .15s; font-weight:500;
  }
  .tab.active {
    background:rgba(140,90,255,0.12); border:0.5px solid rgba(140,90,255,0.3);
    color:#a78bfa;
  }
  .field { margin-bottom:13px; }
  .field label {
    display:block; font-size:10px; letter-spacing:.12em; text-transform:uppercase;
    color:rgba(255,255,255,0.28); font-family:'IBM Plex Mono',monospace; margin-bottom:5px;
  }
  .field input {
    width:100%; background:rgba(255,255,255,0.04);
    border:0.5px solid rgba(255,255,255,0.08);
    border-radius:8px; color:#e8e8e8; padding:11px 13px; font-size:13px;
    font-family:'Montserrat',sans-serif; outline:none; transition:border-color .15s,box-shadow .15s;
  }
  .field input:focus { border-color:#a78bfa; box-shadow:0 0 0 2px rgba(140,90,255,0.12); }
  .invite-hint { font-size:11px; color:rgba(255,255,255,0.2); font-family:'IBM Plex Mono',monospace; margin-top:5px; }
  .btn {
    width:100%; background:rgba(140,90,255,0.15);
    border:0.5px solid rgba(140,90,255,0.35);
    border-radius:10px; color:#a78bfa; padding:13px; font-size:13px;
    font-weight:700; cursor:pointer; font-family:'Montserrat',sans-serif;
    transition:all .2s; margin-top:6px;
  }
  .btn:hover:not(:disabled) { background:rgba(140,90,255,0.25); transform:translateY(-1px); box-shadow:0 6px 20px rgba(140,90,255,0.2); }
  .btn:disabled { background:rgba(255,255,255,0.04); border-color:rgba(255,255,255,0.07); color:rgba(255,255,255,0.2); cursor:not-allowed; transform:none; }
  .error {
    background:rgba(239,68,68,0.07); border:0.5px solid rgba(239,68,68,0.25);
    border-radius:8px; padding:10px 13px; margin-bottom:13px;
    font-size:12px; color:#fca5a5; display:none;
  }
  .success {
    background:rgba(52,211,153,0.07); border:0.5px solid rgba(52,211,153,0.2);
    border-radius:8px; padding:10px 13px; margin-bottom:13px;
    font-size:12px; color:#34d399; display:none;
  }
  .footer { text-align:center; margin-top:20px; font-size:10px; color:rgba(255,255,255,0.15); font-family:'IBM Plex Mono',monospace; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-name">SEO<span>Killer</span></div>
      <div class="logo-sub">Ювелирные украшения</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login',this)">Вход</button>
    <button class="tab" onclick="switchTab('register',this)">Регистрация</button>
  </div>

  <div id="panel-login">
    <div class="error" id="login-error"></div>
    <div class="field"><label>Логин</label><input id="login-username" type="text" placeholder="Введите логин" autocomplete="username"></div>
    <div class="field"><label>Пароль</label><input id="login-password" type="password" placeholder="Введите пароль" autocomplete="current-password"></div>
    <button class="btn" id="login-btn" onclick="login()">Войти</button>
  </div>

  <div id="panel-register" style="display:none">
    <div class="error" id="reg-error"></div>
    <div class="success" id="reg-success"></div>
    <div class="field"><label>Логин</label><input id="reg-username" type="text" placeholder="Придумайте логин" autocomplete="username"></div>
    <div class="field"><label>Пароль</label><input id="reg-password" type="password" placeholder="Минимум 6 символов" autocomplete="new-password"></div>
    <div class="field">
      <label>Инвайт-код</label>
      <input id="reg-code" type="text" placeholder="XXXXXXXXXXXXXXXX" style="text-transform:uppercase;letter-spacing:0.1em;font-family:'IBM Plex Mono',monospace">
      <div class="invite-hint">Код предоставляется администратором</div>
    </div>
    <button class="btn" id="reg-btn" onclick="register()">Зарегистрироваться</button>
  </div>

  <div class="footer">Митрясов Д.С. · НГИЭУ · 2026</div>
</div>

<script>
const API = 'https://seogen-production-961a.up.railway.app';

const token = localStorage.getItem('seo_token');
if (token) {
  fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${token}` } })
    .then(r => r.ok ? window.location.href = 'seo_generator.html' : null).catch(()=>{});
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('panel-register').style.display = tab === 'register' ? 'block' : 'none';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('panel-login').style.display !== 'none') login();
    else register();
  }
});

async function login() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  const errBox = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!username || !password) { errBox.textContent = 'Введите логин и пароль'; errBox.style.display = 'block'; return; }
  errBox.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Вход…';
  try {
    const r = await fetch(`${API}/auth/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
    const data = await r.json();
    if (!r.ok) { errBox.textContent = data.detail || 'Ошибка входа'; errBox.style.display = 'block'; return; }
    localStorage.setItem('seo_token', data.token);
    localStorage.setItem('seo_username', data.username);
    localStorage.setItem('seo_is_admin', data.is_admin);
    window.location.href = 'seo_generator.html';
  } catch { errBox.textContent = 'Ошибка соединения'; errBox.style.display = 'block'; }
  btn.disabled = false; btn.textContent = 'Войти';
}

async function register() {
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value.trim();
  const invite_code = document.getElementById('reg-code').value.trim().toUpperCase();
  const errBox = document.getElementById('reg-error');
  const sucBox = document.getElementById('reg-success');
  const btn = document.getElementById('reg-btn');
  errBox.style.display = 'none'; sucBox.style.display = 'none';
  if (!username || !password || !invite_code) { errBox.textContent = 'Заполните все поля'; errBox.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Регистрация…';
  try {
    const r = await fetch(`${API}/auth/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, password, invite_code}) });
    const data = await r.json();
    if (!r.ok) { errBox.textContent = data.detail || 'Ошибка'; errBox.style.display = 'block'; return; }
    localStorage.setItem('seo_token', data.token);
    localStorage.setItem('seo_username', data.username);
    localStorage.setItem('seo_is_admin', data.is_admin);
    window.location.href = 'seo_generator.html';
  } catch { errBox.textContent = 'Ошибка соединения'; errBox.style.display = 'block'; }
  btn.disabled = false; btn.textContent = 'Зарегистрироваться';
}
</script>
</body>
</html>
